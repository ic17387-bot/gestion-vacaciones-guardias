<!DOCTYPE html><html lang="es"><head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1">  <title>Gestión de Vacaciones y Guardias</title>
  <style>    body{      margin:0;      font-family:Arial, sans-serif;      background:#003366;      color:white;      display:flex;      justify-content:center;      align-items:center;      min-height:100vh;    }
    .contenedor{      width:90%;      max-width:500px;      background:white;      color:#003366;      border-radius:20px;      padding:30px;      text-align:center;      box-shadow:0 10px 30px rgba(0,0,0,.3);    }
    h1{      margin-top:0;    }
    select,    button{      width:100%;      padding:15px;      margin-top:15px;      border-radius:10px;      border:1px solid #ccc;      font-size:16px;    }
    button{      background:#003366;      color:white;      border:none;      cursor:pointer;    }
    button:hover{      opacity:.9;    }  </style></head><body>
<div class="contenedor">
  <h1>Gestión de Vacaciones y Guardias</h1>
  <p>Seleccione su nombre:</p>
  <select id="empleado"> 
       <option>Seleccione...</option>    
       <option>Marisa</option>    
       <option>Itzolma</option>    
       <option>Leonardo</option>    
       <option>Bogar</option>    
       <option>Cynthia</option>    
       <option>Valeria</option>    
       <option>Sergio</option>    
       <option>Carlos</option>    
       <option>Antonio</option>    
       <option>Daniel</option>    
       <option>Iván</option>  
      </select>
      
  <div id="infoEmpleado" style="display:none; margin-top:20px; background:#f5f5f5; padding:15px; border-radius:10px;">

  <h2 id="bienvenida" style="color:#003366;"></h2>

  <p id="saldo" style="font-size:18px;"></p>

  <hr>

  <div id="moduloVacaciones" style="display:none;">

  <h3>🏖 Solicitud de Vacaciones</h3>

  <label>Fecha de inicio</label><br>
  <input type="date" id="fechaInicio"><br><br>

  <label>Fecha de fin</label><br>
  <input type="date" id="fechaFin"><br><br>

  <p id="diasSolicitados"></p>

  <button id="btnSolicitar">
      Solicitar Vacaciones
      </button>

      <button id="btnRegresarVacaciones">
            ⬅ Regresar
            </button>

            </div>

            <div id="moduloHistorial" style="display:none;">

                  <h2>📋 Historial de Solicitudes</h2>

                      <div id="listaHistorial"></div>

                          <br>

                              <button id="btnRegresarHistorial">
                                      ⬅ Regresar
                                          </button>

                                          </div>
<div id="moduloGuardias" style="display:none; background:#f5f5f5; padding:15px; border-radius:10px;">

        <h2>🛡 Registro de Guardia</h2>

            <label>Fecha de la guardia</label><br>
                <input type="date" id="fechaGuardia"><br><br>

            <label>Hora de entrada</label><br>
                <input type="time" id="horaEntrada" step="60"><br><br>

            <label>Hora de salida</label><br>
                 <input type="time" id="horaSalida" step="60"><br><br>

            <label>Tipo de guardia</label><br>
                <select id="tipoGuardia">
                        <option value="">Seleccione...</option>
                        <option>Sábado</option>
                        <option>Domingo</option>
                        <option>Festivo</option>
                        </select>

                        <br><br>

                        <button id="btnGuardarGuardia">
                            Registrar Guardia
                        </button>

                        <button id="btnRegresarGuardias">
                        ⬅ Regresar
                        </button>

                        </div>

    <div id="moduloHistorialGuardias" style="display:none;">

            <h2>📋 Historial de Guardias</h2>

            <p id="totalGuardias" style="
                text-align:center;
                    color:#123A73;
                        font-weight:bold;
                            margin-top:-10px;
                                margin-bottom:15px;
                                ">
                                </p>

                                <div id="listaHistorialGuardias"></div>

            <br>

            <button id="btnRegresarHistorialGuardias">
                ⬅ Regresar
                </button>

                </div>
<div id="menuPrincipal" style="display:none;">

      <button id="btnMenuVacaciones">
              🏖 Solicitar Vacaciones
                  </button>

       <button id="btnMenuGuardias">
              🛡 Registrar Guardia
                  </button>

       <button id="btnHistorial">
              📋 Historial Vacaciones
                  </button>

        <button id="btnHistorialGuardias">
              🛡 Historial de Guardias
                  </button>

       <button id="btnAdministrador">
              🔐 Administrador
                   </button>

 </div>

</div>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="firebase.js"></script>
  <script src="app.js"></script>
</body>
</html>
